# Forge lint configuration — calibrated defaults for Go+Connect projects.
# Adjust thresholds for your project:
#   Stricter (CRUD APIs):    cyclop 12, funlen 60, gocognit 15
#   Looser (operators/billing): cyclop 20, funlen 100, gocognit 30
# Use path-based exclusions for complex subsystems rather than raising global thresholds.

version: "2"

run:
  timeout: 5m

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - revive
    - noctx
    - misspell
    # cyclop dropped: cyclomatic complexity duplicates gocognit (cognitive
    # complexity), which is the better readability signal. gocognit is the
    # single complexity gate; nestif/funlen cover the orthogonal smells.
    - funlen
    - gocognit
    - nestif
    - interfacebloat
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
        # `shadow` flags idiomatic `if err := f(); err != nil` patterns in
        # nested scopes. Go style allows this; enabling it produces ~50
        # findings that are not bugs.
        - shadow
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: exported
        - name: increment-decrement
        - name: var-naming
        - name: unexported-return
        - name: argument-limit
          arguments: [8]
        - name: function-result-limit
          arguments: [4]
        - name: max-public-structs
          # internal/config/config.go declares one type per config knob; the
          # forge convention is a flat, documented config surface rather than
          # nested structs, so the count climbs with feature coverage.
          arguments: [40]
        - name: max-control-nesting
          arguments: [5]
    cyclop:
      # CLI dispatch functions (runNew, runAddService, runConfigSet) branch
      # heavily on flags and resume/force modes — the complexity is in the
      # control flow, not in the logic. Threshold tuned to the natural
      # baseline of those functions; further bumps should refactor instead.
      # MODERATE unified profile (shared with the shipped template). Bumped
      # from the old self-exemption (45) so forge holds itself to the same
      # bar it ships; functions past this are god-funcs to decompose, not
      # threshold to raise.
      max-complexity: 20
      package-average: 6.0
      skip-tests: true
    funlen:
      lines: 150
      statements: 80
    gocognit:
      min-complexity: 80
    nestif:
      min-complexity: 8
    interfacebloat:
      max: 12
    forbidigo:
      # The typed-config guardrail: steer code toward the injected typed
      # config object instead of reading the environment directly. Matches
      # what forge's own project template ships (golangci.yml.tmpl). Runs
      # ADVISORY only (forbidigo is intentionally absent from linters.enable
      # above), so it never gates — it's a signal, not a wall. Without this
      # block, forbidigo falls back to its built-in default (forbid
      # fmt.Print*), which is wrong for a CLI whose job is to print.
      forbid:
        - pattern: 'os\.Getenv'
        - pattern: 'os\.LookupEnv'
        - pattern: 'os\.Environ'
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam
        # Below: pure-cosmetic checks. The CLI code intentionally uses
        # value-receiver ranges over config structs (rangeValCopy fires on
        # 128–304-byte values that are rarely hot-path), favors if/else for
        # short two-arm branches, omits return names on internal helpers,
        # and uses `len(s) == 0`/`if`-with-one-case for forward-compat.
        # Suppressing the checks here keeps the noise out of `forge lint`.
        - rangeValCopy
        - ifElseChain
        - unnamedResult
        - paramTypeCombine
        - singleCaseSwitch
        - emptyStringTest
  exclusions:
    paths:
      - gen
      # Generated, forge-owned files (mock_gen.go, authorizer_gen.go,
      # config_gen.go, ...). Never lint or hand-edit generated code —
      # forge regenerates it and edits would be lost / trip the stomp guard.
      - ".*_gen\\.go$"
      - ".*node_modules.*"
      - ".*frontends.*"
      - ".*\\.pb\\.go$"
      - ".*\\.connect\\.go$"
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocritic
          - funlen
          - cyclop
          - gocognit
      - path: cmd/
        linters:
          - cyclop
          - gocognit
          - funlen
      - path: operators/
        linters:
          - funlen
          - gocognit
          - nestif
          - cyclop

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/reliant-labs/forge