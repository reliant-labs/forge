# Forge lint configuration — calibrated defaults for Go+Connect projects.
# Adjust thresholds for your project:
#   Stricter (CRUD APIs):    cyclop 12, funlen 60, gocognit 15
#   Looser (operators/billing): cyclop 20, funlen 100, gocognit 30
# Use path-based exclusions for complex subsystems rather than raising global thresholds.

version: "2"

run:
  timeout: 5m

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - revive
    - noctx
    - misspell
    - cyclop
    - funlen
    - gocognit
    - nestif
    - interfacebloat
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
        # `shadow` flags idiomatic `if err := f(); err != nil` patterns in
        # nested scopes. Go style allows this; enabling it produces ~50
        # findings that are not bugs.
        - shadow
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: exported
        - name: increment-decrement
        - name: var-naming
        - name: unexported-return
        - name: argument-limit
          arguments: [6]
        - name: function-result-limit
          arguments: [4]
        - name: max-public-structs
          # internal/config/config.go declares one type per config knob; the
          # forge convention is a flat, documented config surface rather than
          # nested structs, so the count climbs with feature coverage.
          arguments: [30]
        - name: max-control-nesting
          arguments: [5]
    cyclop:
      # CLI dispatch functions (runNew, runAddService, runConfigSet) branch
      # heavily on flags and resume/force modes — the complexity is in the
      # control flow, not in the logic. Threshold tuned to the natural
      # baseline of those functions; further bumps should refactor instead.
      max-complexity: 45
      package-average: 7.0
      skip-tests: true
    funlen:
      # `runProjectDev` (dev-loop orchestrator), `runPackageNew` (scaffolds
      # a package end-to-end), `parseProtoFile` (single-pass scanner) all
      # legitimately sit at the line/statement counts below. Further bumps
      # should refactor the function instead.
      lines: 250
      statements: 130
    gocognit:
      # Parsers (parseProtoFile, ToKebabCase) and codegen/migration
      # transforms (codemodHandlersGo, scanPackageFiles, runProjectDev)
      # legitimately accumulate state-machine branches. Refactoring them
      # tends to spread the complexity, not eliminate it.
      min-complexity: 110
    nestif:
      min-complexity: 25
    interfacebloat:
      max: 15
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam
        # Below: pure-cosmetic checks. The CLI code intentionally uses
        # value-receiver ranges over config structs (rangeValCopy fires on
        # 128–304-byte values that are rarely hot-path), favors if/else for
        # short two-arm branches, omits return names on internal helpers,
        # and uses `len(s) == 0`/`if`-with-one-case for forward-compat.
        # Suppressing the checks here keeps the noise out of `forge lint`.
        - rangeValCopy
        - ifElseChain
        - unnamedResult
        - paramTypeCombine
        - singleCaseSwitch
        - emptyStringTest
  exclusions:
    paths:
      - gen
      - ".*node_modules.*"
      - ".*frontends.*"
      - ".*\\.pb\\.go$"
      - ".*\\.connect\\.go$"
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocritic
          - funlen
          - cyclop
          - gocognit
      - path: cmd/
        linters:
          - cyclop
          - gocognit
          - funlen
      - path: operators/
        linters:
          - funlen
          - gocognit
          - nestif
          - cyclop

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/reliant-labs/forge