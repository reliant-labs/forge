version: '3'

# Task wrappers for the forge-next CLI. Kept intentionally minimal — only
# the verbs that have an obvious meaning for a single-binary tool (build,
# test, lint, fmt). Add more as the project grows.

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  deps:
    desc: Install Go dependencies
    cmds:
      - go mod download

  build:
    desc: Build the CLI binary into ./bin/forge-next
    cmds:
      # -trimpath strips local filesystem paths so builds are reproducible
      # across machines; -buildvcs=true embeds the commit/dirty flag for
      # runtime correlation.
      - go build -trimpath -buildvcs=true -o bin/forge-next ./cmd/forge-next

  install:
    desc: Install the CLI binary to $GOBIN (or $GOPATH/bin)
    cmds:
      - go install -trimpath -buildvcs=true ./cmd/forge-next

  test:
    desc: Run Go unit tests
    cmds:
      - go test -race -count=1 ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run

  fmt:
    desc: Format Go source
    cmds:
      - cmd: |
          if ! command -v goimports >/dev/null 2>&1; then
            echo "goimports not installed — run: go install golang.org/x/tools/cmd/goimports@latest" >&2
            exit 1
          fi
          goimports -w .
      - go mod tidy

  vet:
    desc: Run go vet across the module
    cmds:
      - go vet ./...

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf bin
      - rm -f coverage.out
