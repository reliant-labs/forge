version: '3'

vars:
  HUGO: hugo
  DEV_CONFIG: hugo.dev.toml
  PROD_CONFIG: hugo.toml

tasks:
  default:
    desc: Show help message
    cmds:
      - task --list

  help:
    desc: Show this help message
    cmds:
      - task --list

  setup:
    desc: Initial setup (install Hugo + init submodules)
    cmds:
      - task: install
      - echo "Setting up documentation environment..."
      - git submodule update --init --recursive
      - echo "Setup complete!"

  install:
    desc: Install Hugo extended
    cmds:
      - echo "Checking Hugo installation..."
      - |
        if ! command -v hugo > /dev/null; then
          echo "Hugo not found. Installing..."
          if [ "$(uname)" = "Darwin" ]; then
            brew install hugo
          elif [ "$(uname)" = "Linux" ]; then
            echo "Please install Hugo from https://gohugo.io/installation/"
            exit 1
          else
            echo "Unsupported OS. Please install Hugo manually from https://gohugo.io/installation/"
            exit 1
          fi
        else
          echo "Hugo is already installed: $(hugo version)"
        fi

  dev:
    desc: Start development server (with draft content) - NOTE broken internal links need fixing
    cmds:
      - echo "Starting development server..."
      - echo "WARNING - The docs have 25 broken internal links that prevent the server from starting"
      - echo "Run 'task docs:list-broken-links' to see them, or fix them manually"
      - "{{.HUGO}} server --config {{.DEV_CONFIG}} --port 1313 --buildDrafts --watch"

  serve:
    desc: Start production server locally
    cmds:
      - echo "Starting production server locally..."
      - "{{.HUGO}} server --config {{.PROD_CONFIG}} --port 1313"

  build:
    desc: Build for production
    cmds:
      - echo "Building documentation for production..."
      - "{{.HUGO}} --config {{.PROD_CONFIG}} --gc --minify --cleanDestinationDir"

  build-dev:
    desc: Build with development config
    cmds:
      - echo "Building documentation with dev config..."
      - "{{.HUGO}} --config {{.DEV_CONFIG}} --gc --minify --cleanDestinationDir"

  clean:
    desc: Clean build artifacts
    cmds:
      - echo "Cleaning build artifacts..."
      - rm -rf public resources

  preview:
    desc: Build and serve production build locally
    deps: [build]
    cmds:
      - task: serve

  test-build:
    desc: Quick production build test (no minify)
    cmds:
      - echo "Testing production build..."
      - "{{.HUGO}} --config {{.PROD_CONFIG}} --gc --cleanDestinationDir"
      - echo "Build test successful!"
      - ls -lh public/

  check:
    desc: Check for broken links and issues
    cmds:
      - echo "Checking for issues..."
      - "{{.HUGO}} --config {{.PROD_CONFIG}} --gc --minify --cleanDestinationDir"
      - echo "Checking for broken links..."
      - |
        if command -v htmlproofer > /dev/null; then
          htmlproofer ./public --allow-hash-href --check-html --disable-external
        else
          echo "htmlproofer not installed. Skipping link check."
          echo "Install with: gem install html-proofer"
        fi

  new-page:
    desc: Create a new documentation page (usage - task new-page PATH=path/to/page)
    cmds:
      - |
        if [ -z "{{.PATH}}" ]; then
          echo "Error: PATH is required"
          echo "Usage: task new-page PATH=docs/guides/my-guide"
          exit 1
        fi
      - "{{.HUGO}} new content/{{.PATH}}.md"
      - echo "Created new page - content/{{.PATH}}.md"

  stats:
    desc: Show documentation statistics
    cmds:
      - echo "Documentation Statistics:"
      - echo "------------------------"
      - echo "Total pages - $(find content -name '*.md' | wc -l)"
      - echo "Total words - $(find content -name '*.md' -exec cat {} \\; | wc -w)"
      - echo "Public size - $(du -sh public 2>/dev/null || echo 'Not built')"
      - echo ""
      - echo "Pages by section:"
      - find content -type d -mindepth 1 -maxdepth 2 -exec sh -c 'echo "  $(basename {}) - $(find {} -name \"*.md\" | wc -l)"' \;

  update-theme:
    desc: Update theme submodule
    cmds:
      - echo "Updating theme..."
      - git submodule update --remote --merge themes/lotusdocs
      - echo "Theme updated!"

  deps:
    desc: Install dependencies
    cmds:
      - echo "Installing dependencies..."
      - go mod download
      - echo "Dependencies installed!"

  list-broken-links:
    desc: List all broken internal links in the documentation
    cmds:
      - echo "Scanning for broken links..."
      - "{{.HUGO}} --config {{.DEV_CONFIG}} 2>&1 | grep REF_NOT_FOUND || echo 'No broken links found!'"
