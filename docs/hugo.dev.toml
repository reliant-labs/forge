baseURL = 'http://localhost:1313/'
languageCode = 'en-us'
title = 'Forge Documentation (Dev)'
theme = 'lotusdocs'
copyright = "© 2025 Reliant Labs"
enableGitInfo = true
timeZone = 'America/New_York'

# Enable drafts in development
buildDrafts = true
buildFuture = true

# Pagination
[pagination]
  pagerSize = 20

# Module configuration
[module]
  [module.hugoVersion]
    extended = true
    min = "0.100.0"
  [[module.imports]]
    path = "github.com/gohugoio/hugo-mod-bootstrap-scss/v5"

# Markup configuration
[markup]
  defaultMarkdownHandler = "goldmark"
  [markup.tableOfContents]
    endLevel = 3
    startLevel = 1
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    guessSyntax = false
    hl_Lines = ""
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = true
    noClasses = false
    style = "dracula"
    tabWidth = 4

# Output formats
[outputs]
  home = ["HTML", "RSS"]
  page = ["HTML"]
  section = ["HTML", "RSS"]

# Menu configuration
[menu]
  [[menu.primary]]
    name = "Docs"
    url = "docs/"
    identifier = "docs"
    weight = 10

# Site parameters
[params]
  google_fonts = [
    ["Inter", "300, 400, 600, 700"],
    ["Fira Code", "500, 700"]
  ]

  sans_serif_font = "Inter"
  secondary_font = "Inter"
  mono_font = "Fira Code"

  [params.footer]
    copyright = "© :YEAR: Reliant Labs. Built with [Hugo](https://gohugo.io/) & [LotusDocs](https://github.com/colinwilson/lotusdocs)."

  [params.social]
    github = "reliant-labs/forge"

  [params.docs]
    title = "Forge Documentation"
    description = "Proto-first, LLM-optimized gRPC development framework"
    pathName = "docs"
    themeColor = "blue"

    darkMode = true

    prism = true
    prismTheme = "lotusdocs"
    prismThemeDark = "lotusdocs-dark"

    repoURL = "https://github.com/reliant-labs/forge"
    repoBranch = "main"
    editPage = true
    lastMod = true
    lastModRelative = true

    sidebarIcons = true
    breadcrumbs = true
    backToTop = true

    toc = true
    tocMobile = true
    scrollSpy = true

  [params.flexsearch]
    enabled = true
    tokenize = "full"

  custom_css = ["css/custom.css"]

# Development-specific: Enable live reload
[server]
  [[server.headers]]
    for = "/**"
    [server.headers.values]
      X-Frame-Options = "DENY"
      X-Content-Type-Options = "nosniff"
      Referrer-Policy = "strict-origin-when-cross-origin"
