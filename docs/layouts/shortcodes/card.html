{{- $link := .Get "link" -}}
{{- $title := .Get "title" -}}
{{- $icon := .Get "icon" -}}

<div class="col">
  <div class="card h-100">
    <div class="card-body">
      {{- if $icon -}}
      <div class="card-icon mb-3">
        <i class="{{ $icon }}"></i>
      </div>
      {{- end -}}
      <h5 class="card-title">{{ $title }}</h5>
      <p class="card-text">{{ .Inner | markdownify }}</p>
      {{- if $link -}}
      <a href="{{ $link }}" class="btn btn-sm btn-outline-primary">
        Learn More <span class="material-icons ms-1">arrow_forward</span>
      </a>
      {{- end -}}
    </div>
  </div>
</div>
