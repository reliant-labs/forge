syntax = "proto3";

package forge.options.v1;

option go_package = "github.com/reliant-labs/forge/gen/forge/options/v1;optionsv1";

import "google/protobuf/descriptor.proto";

// Message-level options for proto messages that represent database entities.
// Deprecated: DB annotations are now owned by the ORM codegen in pkg/.
// Keep these options for compatibility with existing generated code and
// transition toward the canonical ORM-owned annotation package.
extend google.protobuf.MessageOptions {
  EntityOptions entity_options = 50200;
}

// EntityOptions defines how a proto message maps to a database table.
// Deprecated: transitional compatibility surface — see pkg/orm/ for the canonical DB annotations.
message EntityOptions {
  // Database table name. If empty, derived from the message name.
  string table_name = 1;

  // Indexes to create on this table.
  repeated IndexDef indexes = 2;

  // Enable soft-delete (adds a deleted_at column).
  bool soft_delete = 3;

  // Auto-manage created_at and updated_at timestamp columns.
  bool timestamps = 4;
}

// IndexDef defines a database index on one or more columns.
message IndexDef {
  // Index name. If empty, auto-generated from field names.
  string name = 1;

  // Column names included in this index, in order.
  repeated string fields = 2;

  // Whether this index enforces a uniqueness constraint.
  bool unique = 3;
}