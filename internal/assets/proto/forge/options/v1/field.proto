syntax = "proto3";

package forge.options.v1;

option go_package = "github.com/reliant-labs/forge/gen/forge/options/v1;optionsv1";

import "google/protobuf/descriptor.proto";

// Field-level options for proto fields that map to database columns.
// Deprecated: DB annotations are now owned by the ORM codegen in pkg/.
// Keep these options for compatibility with existing generated code and
// transition toward the canonical ORM-owned annotation package.
extend google.protobuf.FieldOptions {
  FieldOptions field_options = 50300;
}

// FieldOptions defines how a proto field maps to a database column.
// Deprecated: transitional compatibility surface — see pkg/orm/ for the canonical DB annotations.
message FieldOptions {
  // Mark this field as the primary key.
  bool primary_key = 1;

  // Override the database column type (e.g., "TEXT", "JSONB", "VARCHAR(255)").
  string column_type = 2;

  // Column must not be NULL.
  bool not_null = 3;

  // Column has a UNIQUE constraint.
  bool unique = 4;

  // Default value SQL expression (e.g., "0", "'active'", "NOW()").
  string default_value = 5;

  // Foreign key reference in "table.column" format (e.g., "users.id").
  string references = 6;

  // Column uses auto-increment / serial.
  bool auto_increment = 7;

  // Validation rules applied during code generation.
  ValidationRules validation = 8;

  // When true, this field is the tenant key for row-level tenant isolation.
  // The ORM will automatically scope queries by this field using the tenant ID
  // extracted from the request context (set by the TenantInterceptor).
  // Exactly one field per message should be marked as tenant_key.
  bool tenant_key = 20;
}

// ValidationRules defines constraints enforced at the application layer.
message ValidationRules {
  // Field is required (must be non-zero-value).
  bool required = 1;

  // Minimum length for string fields.
  int32 min_length = 2;

  // Maximum length for string fields.
  int32 max_length = 3;

  // Regex pattern the value must match.
  string pattern = 4;

  // Semantic format (e.g., "email", "url", "uuid", "ip").
  string format = 5;

  // Minimum value for numeric fields.
  double min = 6;

  // Maximum value for numeric fields.
  double max = 7;

  // Allowed values (for enum-like string fields).
  repeated string allowed_values = 8;

  // Custom validation function name to call.
  string custom = 9;
}