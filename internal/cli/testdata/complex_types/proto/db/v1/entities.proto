// Test fixture for protoc-gen-forge integration tests.
// This file exercises complex proto types: enums, wrappers, maps, repeated fields,
// nested messages, and timestamps.
syntax = "proto3";

package db.v1;

option go_package = "example.com/test/gen/db/v1;dbv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";
import "forge/v1/forge.proto";

enum PatientStatus {
  PATIENT_STATUS_UNSPECIFIED = 0;
  PATIENT_STATUS_ACTIVE = 1;
  PATIENT_STATUS_INACTIVE = 2;
}

message Address {
  string street = 1;
  string city = 2;
  string state = 3;
  string zip = 4;
}

message Patient {
  option (forge.v1.entity) = {
    table: "patients"
    soft_delete: true
    timestamps: true
  };

  string id = 1 [(forge.v1.field) = { pk: true }];
  string name = 2;
  google.protobuf.StringValue middle_name = 3;  // nullable string
  string email = 4 [(forge.v1.field) = { unique: true }];
  PatientStatus status = 5;  // enum field
  Address address = 6 [(forge.v1.field) = { store: STORE_AS_JSONB }];
  repeated string tags = 7;  // repeated scalar
  map<string, string> metadata = 8;  // map field
  string org_id = 9 [(forge.v1.field) = {
    tenant: true
    ref: "organizations.id"
  }];
  google.protobuf.Timestamp last_visit = 10;  // timestamp
  google.protobuf.Int32Value age = 11;  // nullable int
}
