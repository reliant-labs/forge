// Test fixture for scaffold lifecycle e2e test.
// Exercises entity annotations, tenant keys, soft-delete, foreign keys,
// nullable wrappers, and a full CRUD service definition.
syntax = "proto3";

package services.api.v1;

import "forge/v1/forge.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

option go_package = "github.com/test/myproject/gen/services/api/v1;apiv1";

// ─── Entities ────────────────────────────────────────────────────────────────

message Organization {
  option (forge.v1.entity) = {
    table: "organizations"
    soft_delete: true
    timestamps: true
  };

  string id = 1 [(forge.v1.field) = { pk: true }];
  string name = 2;
  string slug = 3 [(forge.v1.field) = { unique: true }];
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
  google.protobuf.Timestamp deleted_at = 12;
}

message User {
  option (forge.v1.entity) = {
    table: "users"
    timestamps: true
  };

  string id = 1 [(forge.v1.field) = { pk: true }];
  string org_id = 2 [(forge.v1.field) = { tenant: true, ref: "organizations.id" }];
  string email = 3 [(forge.v1.field) = { unique: true }];
  string display_name = 4;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message Task {
  option (forge.v1.entity) = {
    table: "tasks"
    soft_delete: true
    timestamps: true
  };

  string id = 1 [(forge.v1.field) = { pk: true }];
  string org_id = 2 [(forge.v1.field) = { tenant: true, ref: "organizations.id" }];
  string title = 3;
  bool completed = 4;
  google.protobuf.StringValue assignee_id = 5 [(forge.v1.field) = { ref: "users.id" }];
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
  google.protobuf.Timestamp deleted_at = 12;
}

// ─── Service ─────────────────────────────────────────────────────────────────

service APIService {
  option (forge.v1.service) = {
    name: "APIService"
    version: "1.0.0"
    description: "Lifecycle test API service"
  };

  rpc CreateOrganization(CreateOrganizationRequest) returns (CreateOrganizationResponse) {
    option (forge.v1.method) = { auth_required: true, idempotency_key: true };
  }
  rpc GetOrganization(GetOrganizationRequest) returns (GetOrganizationResponse) {
    option (forge.v1.method) = { auth_required: true };
  }
  rpc ListOrganizations(ListOrganizationsRequest) returns (ListOrganizationsResponse) {
    option (forge.v1.method) = { auth_required: true };
  }

  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse) {
    option (forge.v1.method) = { auth_required: true, idempotency_key: true };
  }
  rpc GetUser(GetUserRequest) returns (GetUserResponse) {
    option (forge.v1.method) = { auth_required: true };
  }
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse) {
    option (forge.v1.method) = { auth_required: true };
  }

  rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse) {
    option (forge.v1.method) = { auth_required: true, idempotency_key: true };
  }
  rpc GetTask(GetTaskRequest) returns (GetTaskResponse) {
    option (forge.v1.method) = { auth_required: true };
  }
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse) {
    option (forge.v1.method) = { auth_required: true };
  }
}

// ─── Request/Response messages ───────────────────────────────────────────────

message CreateOrganizationRequest {
  string name = 1;
  string slug = 2;
}
message CreateOrganizationResponse {
  Organization organization = 1;
}

message GetOrganizationRequest {
  string id = 1;
}
message GetOrganizationResponse {
  Organization organization = 1;
}

message ListOrganizationsRequest {
  int32 page_size = 1;
  string page_token = 2;
}
message ListOrganizationsResponse {
  repeated Organization organizations = 1;
  string next_page_token = 2;
}

message CreateUserRequest {
  string org_id = 1;
  string email = 2;
  string display_name = 3;
}
message CreateUserResponse {
  User user = 1;
}

message GetUserRequest {
  string id = 1;
}
message GetUserResponse {
  User user = 1;
}

message ListUsersRequest {
  int32 page_size = 1;
  string page_token = 2;
}
message ListUsersResponse {
  repeated User users = 1;
  string next_page_token = 2;
}

message CreateTaskRequest {
  string org_id = 1;
  string title = 2;
  google.protobuf.StringValue assignee_id = 3;
}
message CreateTaskResponse {
  Task task = 1;
}

message GetTaskRequest {
  string id = 1;
}
message GetTaskResponse {
  Task task = 1;
}

message ListTasksRequest {
  int32 page_size = 1;
  string page_token = 2;
  optional bool completed = 3;
}
message ListTasksResponse {
  repeated Task tasks = 1;
  string next_page_token = 2;
  int32 total_count = 3;
}