name: api-key
description: |
  API key lifecycle management — create, list, revoke, and rotate keys
  with secure hashing. Validator code is installed into
  pkg/middleware/auth/apikey/ — wire it in pkg/app/setup.go:

    import (
      apikeystore "<module>/pkg/apikey"
      apikeyauth "<module>/pkg/middleware/auth/apikey"
    )
    validator := apikeyauth.NewValidator(apikeystore.NewDBKeyStore(db), logger)
version: 1.0.0
subpath: middleware/auth/apikey

config:
  section: auth
  defaults:
    provider: both
    api_key:
      header: X-API-Key

dependencies:
  - golang.org/x/crypto

# Pack-to-pack dependency: api-key writes audit entries through the
# audit_events table that audit-log creates. Installing api-key without
# audit-log first leaves the project with unresolved imports and a
# missing FK target. forge auto-installs declared deps in topological
# order — see ResolveInstallOrder in internal/packs/pack.go.
depends_on:
  - audit-log

files:
  - template: api_key_store.go.tmpl
    output: pkg/apikey/store.go
    overwrite: once
    description: "API key storage interface and DB implementation"

# Migrations get sequential IDs allocated at install time so they don't
# collide with the scaffold's 00001_init or with other packs' migrations.
migrations:
  - name: api_keys
    up: api_key_migration.sql.tmpl
    down: api_key_migration_down.sql.tmpl
    description: "API keys table"

generate:
  - template: api_key_validator_gen.go.tmpl
    output: pkg/middleware/auth/apikey/validator_gen.go
    description: "KeyValidator implementation backed by API key store"
