name: api-key
description: "API key lifecycle management — create, list, revoke, and rotate keys with secure hashing"
version: 1.0.0

config:
  section: auth
  defaults:
    provider: both
    api_key:
      header: X-API-Key

dependencies:
  - golang.org/x/crypto

files:
  - template: api_key_store.go.tmpl
    output: pkg/apikey/store.go
    overwrite: once
    description: "API key storage interface and DB implementation"
  - template: api_key_migration.sql.tmpl
    output: db/migrations/0002_api_keys.up.sql
    overwrite: once
    description: "API keys table migration"
  - template: api_key_migration_down.sql.tmpl
    output: db/migrations/0002_api_keys.down.sql
    overwrite: once
    description: "API keys table rollback"

generate:
  - template: api_key_validator_gen.go.tmpl
    output: pkg/middleware/api_key_validator_gen.go
    description: "KeyValidator implementation backed by API key store"
