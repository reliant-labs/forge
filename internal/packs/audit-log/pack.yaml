name: audit-log
description: "Audit log with DB persistence — tracks who did what, when, with full RPC metadata"
version: 1.0.0

config:
  section: audit_log
  defaults:
    enabled: true
    persist_to_db: true

dependencies: []

files:
  - template: audit_migration.up.sql.tmpl
    output: db/migrations/0003_audit_log.up.sql
    overwrite: once
  - template: audit_migration.down.sql.tmpl
    output: db/migrations/0003_audit_log.down.sql
    overwrite: once
  - template: audit_store.go.tmpl
    output: pkg/audit/store.go
    overwrite: once
    description: "Audit log storage interface and DB implementation"

generate:
  - template: audit_interceptor_gen.go.tmpl
    output: pkg/middleware/audit_gen.go
    description: "Audit interceptor with DB persistence"
