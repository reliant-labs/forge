name: jwt-auth
description: |
  Production-ready JWT validation with JWKS and multi-provider support
  (Auth0, Clerk, Supabase, Firebase). This pack is for REAL token
  validation — local development needs NO pack at all: forge run
  defaults to dev mode, where the scaffold's auth passthrough attaches
  the devClaims() principal from pkg/middleware/middleware.go and
  generated CRUD works with zero auth config.

  Install sets forge.yaml's auth.provider (jwt) and installs code into
  pkg/middleware/auth/jwtauth/. The code has NO call sites until you
  wire it — see the post-install steps printed by `forge pack install`.

  Pair with the `auth-ui` frontend pack for opinionated login/signup UI:
    forge pack install auth-ui --config provider=jwt-auth
post_install: |
  jwtauth.Init() / jwtauth.Interceptor() have no call sites yet — wire
  them where your server is constructed (cmd/server.go builds the
  interceptor chain; setup.go runs before services are constructed):

    import "<module>/pkg/middleware/auth/jwtauth"
    if err := jwtauth.Init(logger, cfg.Mode()); err != nil { return err }
    defer jwtauth.Close()
    // add jwtauth.Interceptor() to the connect.WithInterceptors chain

  jwtauth.Init() calls middleware.MarkExternalAuth() so the scaffold's
  auth interceptor flips to passthrough and this pack's interceptor
  becomes the source of truth. The cfg.Mode() argument injects the typed
  dev-mode gate; the pack never reads ENVIRONMENT itself.

  Set JWT_JWKS_URL (or JWT_HMAC_SECRET / JWT_RSA_PUBLIC_KEY), JWT_ISSUER,
  JWT_AUDIENCE for real validation. Local development does not need this
  pack — dev mode already attaches a synthetic principal.
version: 1.0.0
subpath: middleware/auth/jwtauth

config:
  section: auth
  defaults:
    provider: jwt
    jwt:
      signing_method: RS256
      jwks_url: ""
      issuer: ""
      audience: ""
    dev_mode: true

files:
  - template: jwt_validator.go.tmpl
    output: pkg/middleware/auth/jwtauth/validator.go
    overwrite: always
  - template: dev_auth.go.tmpl
    output: pkg/middleware/auth/jwtauth/dev_auth.go
    overwrite: always
  - template: dev_login_handler.go.tmpl
    output: pkg/middleware/auth/jwtauth/dev_login_handler.go
    overwrite: always

dependencies:
  - github.com/golang-jwt/jwt/v5
  - github.com/MicahParks/keyfunc/v3@v3.8.0

generate:
  - template: auth_gen_override.go.tmpl
    output: pkg/middleware/auth/jwtauth/auth_gen.go
    description: "JWKS-based authentication interceptor for the jwt-auth pack"
