# Forge-managed GatewayClass for the Traefik provider. Cluster-scoped;
# applied once at `forge cluster up` time. Project Gateways
# reference this by name via `gateway_class_name = "traefik"` (the
# default in kcl/schema.k Gateway.gateway_class_name).
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: traefik
  labels:
    app.kubernetes.io/managed-by: forge
spec:
  controllerName: traefik.io/gateway-controller
