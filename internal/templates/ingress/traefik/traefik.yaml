# Forge-vendored Traefik install. Refresh procedure:
#
#   1. Bump VERSION (sibling file) to the new traefik=vX.Y.Z.
#   2. Pull the upstream traefik-helm-chart at that tag, run
#      `helm template traefik --set providers.kubernetesGateway.enabled=true`,
#      strip release-name annotations.
#   3. Reconcile this file's resources against the templated output.
#
# What's here: namespace, ServiceAccount, ClusterRole + binding for
# Gateway API resources, Deployment running the pinned traefik image
# with --providers.kubernetesgateway=true, and a ClusterIP Service
# Traefik exposes its proxied listeners on. We deliberately omit the
# dashboard/IngressRoute CRDs — projects on the forge Gateway API
# path don't need them, and skipping keeps the install surface area
# small and audit-friendly.
---
apiVersion: v1
kind: Namespace
metadata:
  name: traefik-system
  labels:
    app.kubernetes.io/managed-by: forge
    app.kubernetes.io/part-of: forge-ingress
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: traefik
  namespace: traefik-system
  labels:
    app.kubernetes.io/managed-by: forge
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: traefik
  labels:
    app.kubernetes.io/managed-by: forge
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "secrets", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      - gatewayclasses
      - gateways
      - httproutes
      - grpcroutes
      - referencegrants
      - tlsroutes
      - tcproutes
      - udproutes
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      - gatewayclasses/status
      - gateways/status
      - httproutes/status
      - grpcroutes/status
      - tlsroutes/status
      - tcproutes/status
      - udproutes/status
    verbs: ["update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: traefik
  labels:
    app.kubernetes.io/managed-by: forge
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: traefik
subjects:
  - kind: ServiceAccount
    name: traefik
    namespace: traefik-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik
  namespace: traefik-system
  labels:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/managed-by: forge
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: traefik
  template:
    metadata:
      labels:
        app.kubernetes.io/name: traefik
    spec:
      serviceAccountName: traefik
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: traefik
          # Pinned per VERSION sibling file. Refresh in lockstep.
          image: traefik:v3.2.1
          args:
            - --providers.kubernetesgateway=true
            - --providers.kubernetesgateway.experimentalchannel=true
            - --log.level=INFO
            - --accesslog=true
            - --metrics.prometheus=true
            - --ping=true
          ports:
            - name: ping
              containerPort: 8080
              protocol: TCP
          # Traefik binds listener ports dynamically based on the
          # Gateway resources in the cluster — no static containerPort
          # entries for them. The k3d port mapping (driven by
          # deploy/k3d-ports.yaml) exposes the listener ports through
          # to the host.
          livenessProbe:
            httpGet:
              path: /ping
              port: ping
            initialDelaySeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ping
              port: ping
            initialDelaySeconds: 5
            failureThreshold: 1
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
---
apiVersion: v1
kind: Service
metadata:
  name: traefik
  namespace: traefik-system
  labels:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/managed-by: forge
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: traefik
  # Listener ports are added by the Gateway controller dynamically
  # at runtime — kubectl get svc may report no ports until the first
  # Gateway resource is reconciled. The k3d loadbalancer maps host
  # ports to this Service.
  ports:
    - name: ping
      port: 8080
      targetPort: ping
      protocol: TCP
