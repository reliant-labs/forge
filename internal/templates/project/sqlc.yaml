version: "2"
sql:
  - engine: "postgresql"
    schema: "db/migrations/"
    queries: "db/queries/"
    gen:
      go:
        package: "dbquery"
        out: "gen/dbquery"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        emit_methods_with_db_argument: true
