syntax = "proto3";

package forge.options.v1;

option go_package = "github.com/reliant-labs/forge/gen/forge/options/v1;optionsv1";

import "google/protobuf/descriptor.proto";

// Field-level options for service configuration proto messages.
// These annotations define how config fields bind to environment variables
// and CLI flags — a core feature of Forge's config system.
//
// Example usage:
//
//   message UserServiceConfig {
//     string database_url = 1 [(forge.options.v1.config_field) = {
//       env_var: "DATABASE_URL",
//       flag: "database-url",
//       required: true,
//       description: "PostgreSQL connection string"
//     }];
//
//     int32 port = 2 [(forge.options.v1.config_field) = {
//       env_var: "PORT",
//       flag: "port",
//       default_value: "8080",
//       description: "HTTP server port"
//     }];
//   }
extend google.protobuf.FieldOptions {
  ConfigFieldOptions config_field = 50400;
}

// ConfigFieldOptions defines how a config proto field maps to runtime
// configuration sources (environment variables and CLI flags).
message ConfigFieldOptions {
  // Environment variable name to read this field from (e.g., "DATABASE_URL").
  string env_var = 1;

  // CLI flag name, without leading dashes (e.g., "database-url").
  string flag = 2;

  // Default value as a string. Applied when neither env var nor flag is set.
  string default_value = 3;

  // Whether this field must be provided. Startup fails if missing.
  bool required = 4;

  // Human-readable description shown in --help output and documentation.
  string description = 5;
}