syntax = "proto3";

package forge.options.v1;

option go_package = "github.com/reliant-labs/forge/gen/forge/options/v1;optionsv1";

import "google/protobuf/descriptor.proto";
import "google/protobuf/duration.proto";

// Method-level options for Connect RPC method definitions.
// These annotations control per-RPC behavior such as authentication,
// idempotency, and timeouts.
extend google.protobuf.MethodOptions {
  MethodOptions method_options = 50100;
}

// MethodOptions defines per-method behavior annotations.
message MethodOptions {
  // Whether this method requires authentication.
  // Overrides the service-level AuthConfig.auth_required default.
  bool auth_required = 1;

  // Whether this method is idempotent (safe to retry).
  bool idempotent = 3;

  // Server-side timeout for this method. Zero means use the service default.
  google.protobuf.Duration timeout = 4;

  // Whether callers are expected to supply an idempotency key for this
  // method. Purely a *convention marker* — forge does not enforce or inspect
  // it. When set, tooling, docs, and generated clients can advise callers to
  // pass a unique key (e.g. an `Idempotency-Key` header) so the server can
  // safely deduplicate retried mutations.
  //
  // Enable this on standard mutating operations whose effects must not be
  // duplicated if a client retries after a network failure:
  //   - Create: a retry must not create two rows
  //   - Update: a retry must not apply the update twice
  //   - Delete: a retry must not fail because the resource is already gone
  //
  // Read-only methods (Get, List, Search) are naturally idempotent and do
  // not need this flag — prefer the `idempotent` option above for pure
  // retry-safety signalling.
  bool idempotency_key = 5;
}