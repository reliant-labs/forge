syntax = "proto3";

package forge.project.v1;

option go_package = "github.com/reliant-labs/forge/gen/forge/project/v1;projectv1";

message ProjectConfig {
  string name = 1;
  string module_path = 2;
  string version = 3;
  Mode mode = 4;
  bool hot_reload = 5;
  repeated ServiceConfig services = 6;
  repeated FrontendConfig frontends = 7;
  repeated EnvironmentConfig environments = 8;
  DatabaseConfig database = 9;
  CIConfig ci = 10;
  DockerConfig docker = 11;
  K8sConfig k8s = 12;
}

enum Mode {
  MODE_UNSPECIFIED = 0;
  MODE_FULL = 2;
}

enum ServiceType {
  SERVICE_TYPE_UNSPECIFIED = 0;
  SERVICE_TYPE_GO_SERVICE = 1;
  SERVICE_TYPE_WORKER = 2;
}

enum FrontendType {
  FRONTEND_TYPE_UNSPECIFIED = 0;
  FRONTEND_TYPE_NEXTJS = 1;
}

enum EnvironmentType {
  ENVIRONMENT_TYPE_UNSPECIFIED = 0;
  ENVIRONMENT_TYPE_LOCAL = 1;
  ENVIRONMENT_TYPE_CLOUD = 2;
}

enum CIProvider {
  CI_PROVIDER_UNSPECIFIED = 0;
  CI_PROVIDER_GITHUB = 1;
}

enum K8sProvider {
  K8S_PROVIDER_UNSPECIFIED = 0;
  K8S_PROVIDER_K3D = 1;
  K8S_PROVIDER_GKE = 2;
  K8S_PROVIDER_EKS = 3;
}

message ServiceConfig {
  string name = 1;
  ServiceType type = 2;
  string path = 3;
  int32 port = 4;
  repeated string proto_packages = 5;
}

message FrontendConfig {
  string name = 1;
  FrontendType type = 2;
  string path = 3;
  int32 port = 4;
}

message EnvironmentConfig {
  string name = 1;
  EnvironmentType type = 2;
  repeated string services = 3;
  string registry = 4;
  string namespace = 5;
  string domain = 6;
}

message DatabaseConfig {
  string driver = 1;
  string migrations_dir = 2;
  bool sqlc_enabled = 3;
}

message CIConfig {
  CIProvider provider = 1;
  bool lint = 2;
  bool test = 3;
  bool build = 4;
  bool deploy = 5;
  bool vuln_scan = 6;
}

message DockerConfig {
  string registry = 1;
  map<string, string> base_images = 2;
}

message K8sConfig {
  K8sProvider provider = 1;
  string kcl_dir = 2;
}